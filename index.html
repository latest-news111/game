<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smooth Snake with Encrypted High Scores</title>
<style>
body {
  background: #111;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  font-family: sans-serif;
  flex-direction: column;
}
#scoreBoard { font-size: 24px; margin-bottom: 20px; }
canvas {
  background: #000;
  border: 6px solid red;
  width: 800px;
  height: 800px;
  image-rendering: pixelated;
}
#menu {
  position: absolute;
  text-align: center;
  display: none;
  color: #fff;
  padding: 20px;
  border-radius: 12px;
  background: rgba(0,0,0,0.85);
  border: 2px solid #f00;
}
button { margin: 10px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
select { margin: 10px; padding: 5px 10px; font-size: 16px; }
.highScores { text-align: left; margin-top: 10px; }
/* Reset button */
#resetScoresBtn {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 100;
  padding: 5px 10px;
  font-size: 14px;
}
</style>
</head>
<body>
<!-- Reset High Scores button -->
<button id="resetScoresBtn">Reset High Scores</button>

<div id="scoreBoard">🏆: 0</div>
<canvas id="game" width="400" height="400"></canvas>
<div id="menu">
  <h1>Game Over</h1>
  <p id="scoreText"></p>
  <label for="difficultySelect">Difficulty:</label>
  <select id="difficultySelect">
    <option value="Too Easy">Too Easy</option>
    <option value="Easy" selected>Easy</option>
    <option value="Medium">Medium</option>
    <option value="Difficult">Difficult</option>
    <option value="Hard">Hard</option>
    <option value="Impossible">Impossible</option>
  </select>
  <br>
  <div class="highScores" id="highScoresList"></div>
  <button onclick="restartGame()">Play Again</button>
  <button onclick="quitGame()">Quit</button>
</div>

<script>
// --- Encryption utilities ---
const secretKey = "mySuperSecretKey"; // must be consistent to decrypt
function encryptScore(score){
  return btoa(JSON.stringify(score).split("").map(c=>String.fromCharCode(c.charCodeAt(0)^secretKey.charCodeAt(0))).join(""));
}
function decryptScore(enc){
  try{
    return parseInt(String.fromCharCode(...atob(enc).split("").map((c,i)=>c.charCodeAt(0)^secretKey.charCodeAt(0))));
  } catch { return 0; }
}

// --- DOM elements ---
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const menu = document.getElementById("menu");
const scoreText = document.getElementById("scoreText");
const highScoresList = document.getElementById("highScoresList");
const scoreBoard = document.getElementById("scoreBoard");
const difficultySelect = document.getElementById("difficultySelect");
const resetBtn = document.getElementById("resetScoresBtn");

// --- Game variables ---
const grid = 20;
let snake=[], pixelSnake=[], direction={x:0,y:-1}, nextDirection={x:0,y:-1};
let food, score=0, gameOver=false, started=false;
let moveInterval=100, moveTimer=0;
let difficulty = difficultySelect.value;
let prevA=false, prevB=false;

// --- Images ---
const snakeHeadImg = new Image();
snakeHeadImg.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAtklEQVR4AYyOwQ3CQAwED9786IAGePGgByT6oQAkSqAACkCiC140QCsHc2KR4yT2RVr5bO9OvCzBd12tKwosJQREQe0mAZv7oaLLbV8Qb6SQrX8Aht+51Rrcu4Hxat4AGvA3LbKqTANY83dh28F7ajcCDBKuOe9eBdlxN8AGeSNAXQCZT89tseoC2DABr/CCLAwsBGDgZOqcUsBcUPMGeB8fCw1Udb56X5VpAL9Un52PLwRgyPQBAAD//zi8y3MAAAAGSURBVAMACVo+FYZZcBQAAAAASUVORK5CYII=";
const snakeBodyImg = new Image();
snakeBodyImg.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAuklEQVR4AYzOwQ3CMBSD4Sp7cGEBTmzBRAzALFyZgxNLsEarr5KrtE2kVPqVPPvZTbl+HvOR9/8y46i35jJ1vuf31nH2crdgv9aeXvffdCogjvzdntpdQURGDzvwE2wFtdgK88ETdKIQYegRXxD13voCImojd2EeotXnWmAJtTF6L5ohoATuNS0t/voCg5IgEGj8zPVJ3woMQQjHmRZ4ypoFDFjqkaJTQYJZ6BVEPxUwhJ0jNAvyipGCBQAA//8HqZePAAAABklEQVQDAEK1gBkbAveoAAAAAElFTkSuQmCC";

// --- Speeds ---
const speedMap = { "Too Easy":200, "Easy":150, "Medium":100, "Difficult":70, "Hard":50, "Impossible":25 };

// --- High scores ---
let highScores = {};
["Too Easy","Easy","Medium","Difficult","Hard","Impossible"].forEach(d=>{
  highScores[d] = decryptScore(localStorage.getItem("snakeHighScore_"+d)) || 0;
});

// --- Functions ---
function init(){
  snake=[{x:160,y:160}]; pixelSnake=[{x:160,y:160}];
  direction={x:0,y:-1}; nextDirection={x:0,y:-1};
  started=false; score=0; gameOver=false;
  menu.style.display="none"; difficulty=difficultySelect.value;
  moveInterval=speedMap[difficulty];
  spawnFood(); updateScore();
  prevA = prevB = false;
}

function spawnFood(){
  food={x:Math.floor(Math.random()*20)*grid, y:Math.floor(Math.random()*20)*grid};
}

function getGamepadDirection(){
  const gp = navigator.getGamepads()[0]; if(!gp) return;

  const x = gp.axes[0], y = gp.axes[1], t=0.5;
  if(Math.abs(x)>Math.abs(y)){
    if(x>t && direction.x===0){ nextDirection={x:1,y:0}; started=true; }
    if(x<-t && direction.x===0){ nextDirection={x:-1,y:0}; started=true; }
  } else {
    if(y>t && direction.y===0){ nextDirection={x:0,y:1}; started=true; }
    if(y<-t && direction.y===0){ nextDirection={x:0,y:-1}; started=true; }
  }

  // Gamepad menu buttons (rising edge)
  if(gameOver){
    const currA = gp.buttons[0].pressed;
    const currB = gp.buttons[1].pressed;
    if(currA && !prevA) restartGame();
    if(currB && !prevB) quitGame();
    prevA = currA; prevB = currB;
  }
}

// --- Keyboard ---
window.addEventListener("keydown", e=>{
  if(!started) started=true;
  switch(e.key){
    case "ArrowUp": case "w": case "W": if(direction.y===0) nextDirection={x:0,y:-1}; break;
    case "ArrowDown": case "s": case "S": if(direction.y===0) nextDirection={x:0,y:1}; break;
    case "ArrowLeft": case "a": case "A": if(direction.x===0) nextDirection={x:-1,y:0}; break;
    case "ArrowRight": case "d": case "D": if(direction.x===0) nextDirection={x:1,y:0}; break;
  }
});

function showGameOver(){
  gameOver=true;
  if(score>highScores[difficulty]){
    highScores[difficulty]=score;
    localStorage.setItem("snakeHighScore_"+difficulty, encryptScore(score));
  }
  scoreText.textContent=`Score: ${score}`;
  highScoresList.innerHTML="<strong>High Scores:</strong><br>";
  for(let d in highScores) highScoresList.innerHTML+=`${d}: ${highScores[d]}<br>`;
  menu.style.display="block";
}

function restartGame(){init();}
function quitGame() {
  menu.innerHTML = "<h1>Thanks for playing!</h1>";
  menu.style.display = "block";
  setTimeout(() => {
    try { window.close(); }
    catch(e) { alert("Please close the tab to exit the game."); }
  }, 1000);
}
function updateScore(){scoreBoard.textContent=`🏆: ${score}`;}

function loop(timestamp){
  getGamepadDirection();
  if(!started || gameOver){requestAnimationFrame(loop); return;}
  if(!moveTimer) moveTimer=timestamp;
  const delta = timestamp - moveTimer;
  if(delta >= moveInterval){ moveSnake(); moveTimer = timestamp; }

  for(let i=0;i<snake.length;i++){
    if(!pixelSnake[i]) pixelSnake[i]={x:snake[i].x,y:snake[i].y};
    pixelSnake[i].x += (snake[i].x - pixelSnake[i].x) * 0.4;
    pixelSnake[i].y += (snake[i].y - pixelSnake[i].y) * 0.4;
  }

  draw();
  requestAnimationFrame(loop);
}

function moveSnake(){
  direction = nextDirection;
  if(direction.x===0 && direction.y===0) return;
  const head={x:snake[0].x+direction.x*grid, y:snake[0].y+direction.y*grid};
  if(head.x<0||head.x>=canvas.width||head.y<0||head.y>=canvas.height){showGameOver(); return;}
  snake.unshift(head);

  if(head.x===food.x && head.y===food.y){ score++; updateScore(); spawnFood(); }
  else{ snake.pop(); pixelSnake.pop(); }

  for(let i=1;i<snake.length;i++){
    if(head.x===snake[i].x && head.y===snake[i].y){ showGameOver(); return; }
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.font=`${grid*0.9}px serif`;
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText("🍎", food.x + grid/2, food.y + grid/2);

  pixelSnake.forEach((s,i)=>{
    ctx.save(); ctx.translate(s.x+grid/2, s.y+grid/2);
    let angle=0;
    if(i===0){
      if(direction.x===1) angle=Math.PI/2;
      else if(direction.x===-1) angle=-Math.PI/2;
      else if(direction.y===1) angle=Math.PI;
      ctx.rotate(angle);
      ctx.drawImage(snakeHeadImg, -grid/2, -grid/2, grid, grid);
    } else {
      let prev=pixelSnake[i-1];
      let dx=prev.x-s.x; let dy=prev.y-s.y;
      if(dx===grid) angle=0; else if(dx===-grid) angle=Math.PI;
      else if(dy===grid) angle=Math.PI/2; else if(dy===-grid) angle=-Math.PI/2;
      ctx.rotate(angle);
      ctx.drawImage(snakeBodyImg, -grid/2, -grid/2, grid, grid);
    }
    ctx.restore();
  });
}

difficultySelect.addEventListener("change", ()=>{
  difficulty=difficultySelect.value;
  moveInterval=speedMap[difficulty];
});

// --- Reset High Scores ---
resetBtn.addEventListener("click", () => {
  ["Too Easy","Easy","Medium","Difficult","Hard","Impossible"].forEach(d => {
    localStorage.removeItem("snakeHighScore_" + d);
    highScores[d] = 0;
  });
  if(menu.style.display === "block"){
    highScoresList.innerHTML = "<strong>High Scores:</strong><br>";
    for(let d in highScores){
      highScoresList.innerHTML += `${d}: ${highScores[d]}<br>`;
    }
  }
  alert("All high scores have been reset!");
});

window.addEventListener("gamepadconnected", e=>console.log("Gamepad connected:", e.gamepad));

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
