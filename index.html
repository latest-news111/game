<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake (Fixed Grid + Smooth + Touch)</title>

<style>
body {
  background: #111;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  font-family: sans-serif;
  flex-direction: column;
}

#topBar {
  position: absolute;
  top: 10px;
  left: 10px;
  display: flex;
  gap: 5px;
}

canvas {
  background: #000;
  border: 6px solid red;
  width: 800px;
  height: 800px;
  image-rendering: pixelated;
}

#gameWrapper {
  transform-origin: top center;
}

#menu {
  position: absolute;
  display: none;
  padding: 20px;
  background: rgba(0,0,0,0.9);
  border: 2px solid red;
  border-radius: 10px;
  text-align: center;
}
</style>
</head>

<body>

<div id="topBar">
  <button id="resetScoresBtn">Reset</button>
  <button id="zoomInBtn">➕</button>
  <button id="zoomOutBtn">➖</button>
</div>

<div id="scoreBoard">🏆: 0</div>

<div id="gameWrapper">
  <canvas id="game" width="400" height="400"></canvas>
</div>

<div id="menu">
  <h1>Game Over</h1>
  <p id="scoreText"></p>
  <select id="difficultySelect">
    <option>Too Easy</option>
    <option>Easy</option>
    <option selected>Medium</option>
    <option>Difficult</option>
    <option>Hard</option>
    <option>Impossible</option>
  </select>
  <div id="highScoresList"></div>
  <button onclick="restartGame()">Play Again</button>
  <button onclick="quitGame()">Quit</button>
</div>

<script>
// -------- SCALE --------
let scale = 1;
const wrapper = document.getElementById("gameWrapper");

zoomInBtn.onclick = () => {
  scale += 0.1;
  wrapper.style.transform = `scale(${scale})`;
};

zoomOutBtn.onclick = () => {
  scale = Math.max(0.5, scale - 0.1);
  wrapper.style.transform = `scale(${scale})`;
};

// -------- ENCRYPT --------
const key="secret";
const enc=s=>btoa([...s].map(c=>String.fromCharCode(c.charCodeAt(0)^key.charCodeAt(0))).join(""));
const dec=s=>{
  try{return parseInt([...atob(s)].map(c=>String.fromCharCode(c.charCodeAt(0)^key.charCodeAt(0))).join(""));}
  catch{return 0;}
};

// -------- SETUP --------
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const menu = document.getElementById("menu");
const scoreText = document.getElementById("scoreText");
const scoreBoard = document.getElementById("scoreBoard");
const difficultySelect = document.getElementById("difficultySelect");
const highScoresList = document.getElementById("highScoresList");

const grid = 20;
const tileCount = 20;

let snake, pixelSnake, direction, nextDirection;
let food, score, gameOver, started;
let moveInterval, lastMoveTime;

const speeds = {
  "Too Easy":200,
  "Easy":150,
  "Medium":100,
  "Difficult":70,
  "Hard":50,
  "Impossible":25
};

// -------- IMAGES --------
const headImg = new Image();
headImg.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAtklEQVR4AYyOwQ3CQAwED9786IAGePGgByT6oQAkSqAACkCiC140QCsHc2KR4yT2RVr5bO9OvCzBd12tKwosJQREQe0mAZv7oaLLbV8Qb6SQrX8Aht+51Rrcu4Hxat4AGvA3LbKqTANY83dh28F7ajcCDBKuOe9eBdlxN8AGeSNAXQCZT89tseoC2DABr/CCLAwsBGDgZOqcUsBcUPMGeB8fCw1Udb56X5VpAL9Un52PLwRgyPQBAAD//zi8y3MAAAAGSURBVAMACVo+FYZZcBQAAAAASUVORK5CYII=";

const bodyImg = new Image();
bodyImg.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAuklEQVR4AYzOwQ3CMBSD4Sp7cGEBTmzBRAzALFyZgxNLsEarr5KrtE2kVPqVPPvZTbl+HvOR9/8y46i35jJ1vuf31nH2crdgv9aeXvffdCogjvzdntpdQURGDzvwE2wFtdgK88ETdKIQYegRXxD13voCImojd2EeotXnWmAJtTF6L5ohoATuNS0t/voCg5IgEGj8zPVJ3woMQQjHmRZ4ypoFDFjqkaJTQYJZ6BVEPxUwhJ0jNAvyipGCBQAA//8HqZePAAAABklEQVQDAEK1gBkbAveoAAAAAElFTkSuQmCC";

// -------- HIGHSCORES --------
let highs={};
Object.keys(speeds).forEach(d=>{
  highs[d]=dec(localStorage.getItem("snake_"+d))||0;
});

// -------- INIT --------
function init(){
  snake=[{x:10,y:10}]; // GRID positions now
  pixelSnake=[{x:10,y:10}];

  direction={x:0,y:-1};
  nextDirection={x:0,y:-1};

  score=0;
  gameOver=false;
  started=false;

  moveInterval=speeds[difficultySelect.value];
  spawnFood();
  updateScore();
  menu.style.display="none";
}

function spawnFood(){
  food={
    x:Math.floor(Math.random()*tileCount),
    y:Math.floor(Math.random()*tileCount)
  };
}

// -------- INPUT --------
window.addEventListener("keydown", e=>{
  started=true;
  if(e.key==="ArrowUp"||e.key==="w") if(direction.y===0) nextDirection={x:0,y:-1};
  if(e.key==="ArrowDown"||e.key==="s") if(direction.y===0) nextDirection={x:0,y:1};
  if(e.key==="ArrowLeft"||e.key==="a") if(direction.x===0) nextDirection={x:-1,y:0};
  if(e.key==="ArrowRight"||e.key==="d") if(direction.x===0) nextDirection={x:1,y:0};
});

// TOUCH (FIXED)
let sx=0, sy=0;
canvas.addEventListener("touchstart", e=>{
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
});
canvas.addEventListener("touchend", e=>{
  let dx=e.changedTouches[0].clientX-sx;
  let dy=e.changedTouches[0].clientY-sy;

  started=true;

  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>0 && direction.x===0) nextDirection={x:1,y:0};
    if(dx<0 && direction.x===0) nextDirection={x:-1,y:0};
  } else {
    if(dy>0 && direction.y===0) nextDirection={x:0,y:1};
    if(dy<0 && direction.y===0) nextDirection={x:0,y:-1};
  }
});

// -------- GAME --------
function moveSnake(){
  direction=nextDirection;

  const head={
    x:snake[0].x+direction.x,
    y:snake[0].y+direction.y
  };

  if(head.x<0||head.y<0||head.x>=tileCount||head.y>=tileCount){
    showGameOver(); return;
  }

  snake.unshift(head);

  if(head.x===food.x && head.y===food.y){
    score++; updateScore(); spawnFood();
  } else {
    snake.pop(); pixelSnake.pop();
  }

  for(let i=1;i<snake.length;i++){
    if(head.x===snake[i].x && head.y===snake[i].y){
      showGameOver(); return;
    }
  }
}

// -------- LOOP --------
function loop(t){
  if(!started || gameOver){
    requestAnimationFrame(loop); return;
  }

  if(!lastMoveTime) lastMoveTime=t;

  if(t-lastMoveTime > moveInterval){
    moveSnake();
    lastMoveTime=t;
  }

  // smooth but locked to grid target
  snake.forEach((s,i)=>{
    if(!pixelSnake[i]) pixelSnake[i]={x:s.x,y:s.y};
    pixelSnake[i].x += (s.x - pixelSnake[i].x)*0.25;
    pixelSnake[i].y += (s.y - pixelSnake[i].y)*0.25;
  });

  draw();
  requestAnimationFrame(loop);
}

// -------- DRAW --------
function draw(){
  ctx.clearRect(0,0,400,400);

  ctx.font="18px serif";
  ctx.fillText("🍎", food.x*grid+10, food.y*grid+10);

  pixelSnake.forEach((s,i)=>{
    ctx.save();
    ctx.translate(s.x*grid+10, s.y*grid+10);

    let angle=0;
    if(i===0){
      if(direction.x===1) angle=Math.PI/2;
      if(direction.x===-1) angle=-Math.PI/2;
      if(direction.y===1) angle=Math.PI;
      ctx.rotate(angle);
      ctx.drawImage(headImg,-10,-10,20,20);
    } else {
      ctx.drawImage(bodyImg,-10,-10,20,20);
    }

    ctx.restore();
  });
}

// -------- UI --------
function updateScore(){
  scoreBoard.textContent="🏆: "+score;
}

function showGameOver(){
  gameOver=true;
  let d=difficultySelect.value;

  if(score>highs[d]){
    highs[d]=score;
    localStorage.setItem("snake_"+d, enc(score.toString()));
  }

  scoreText.textContent="Score: "+score;

  highScoresList.innerHTML="<b>High Scores</b><br>";
  for(let k in highs){
    highScoresList.innerHTML+=`${k}: ${highs[k]}<br>`;
  }

  menu.style.display="block";
}

function restartGame(){ init(); }

function quitGame(){
  menu.innerHTML="<h1>Thanks for playing!</h1>";
  setTimeout(()=>{
    try{window.close();}
    catch{alert("Close tab to exit");}
  },5000);
}

// reset
resetScoresBtn.onclick=()=>{
  Object.keys(highs).forEach(d=>{
    localStorage.removeItem("snake_"+d);
    highs[d]=0;
  });
  alert("Scores reset");
};

// -------- START --------
init();
requestAnimationFrame(loop);
</script>

</body>
</html>
